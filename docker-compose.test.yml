services:
  identity-db:
    image: postgres:16-alpine
    container_name: identity-db
    environment:
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity
      POSTGRES_DB: identity
    ports:
      - "5432:5432"
    volumes:
      - identity-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: identity-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - identity-redis-data:/data

  synapse-db:
    image: postgres:16-alpine
    container_name: identity-synapse-postgres
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - synapse-postgres-data:/var/lib/postgresql/data

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: identity-synapse
    depends_on:
      - synapse-db
      - mas
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
      SYNAPSE_LOG_CONFIG: /data/log.config
      SYNAPSE_SERVER_NAME: dev.local
      SYNAPSE_REPORT_STATS: "no"
      SYNAPSE_NO_TLS: "true"
      SYNAPSE_POSTGRES_HOST: synapse-db
      SYNAPSE_POSTGRES_PORT: 5432
      SYNAPSE_POSTGRES_USER: synapse
      SYNAPSE_POSTGRES_PASSWORD: synapse
      SYNAPSE_POSTGRES_DB: synapse
      SYNAPSE_POSTGRES_USE_SSL: "false"
      SYNAPSE_REGISTRATION_SHARED_SECRET: dev_shared_secret
      SYNAPSE_ALLOW_PUBLIC_REGISTRATION: "false"
    volumes:
      - ./docker/synapse/data:/data
    ports:
      - "8008:8008"

  mas:
    image: ghcr.io/gua-ra/gua-auth-service:v1.18.0-gua.1
    container_name: mas
    depends_on:
      - mas-db
    command: [ "server", "--config", "/config/mas.conf.yaml" ]
    volumes:
      - ./docker/mas/mas.conf.yaml:/config/mas.conf.yaml:ro
    environment:
      RUST_LOG: info
      MAS_PORT: 8080
      MAS_DOMAIN: dev.local
      MAS_PUBLIC_BASE_URL: http://mas:8080
      MAS_MATRIX_HOMESERVER: dev.local
      MAS_MATRIX_ENDPOINT: http://synapse:8008
      MAS_MATRIX_SECRET: dev_shared_secret
      MAS_ENCRYPTION_SECRET: 4ef37f9c88c1d42ffab7cdd9c49b2c2b2c6e3cf90c7a1b2ed9338da7a1e3f6a7
      MAS_UPSTREAM_ISSUER: http://host.docker.internal:8080
      MAS_UPSTREAM_CLIENT_ID: test_client_id
      MAS_UPSTREAM_CLIENT_SECRET: test_client_secret
      MAS_UPSTREAM_JWKS_URI: http://host.docker.internal:8080/.well-known/openid-configuration/jwks
    ports:
      - "8090:8080"

  mas-db:
    image: postgres:16-alpine
    container_name: mas-db
    environment:
      POSTGRES_USER: mas
      POSTGRES_PASSWORD: maspass
      POSTGRES_DB: mas
    volumes:
      - mas-postgres-data:/var/lib/postgresql/data

volumes:
  identity-postgres-data:
  identity-redis-data:
  synapse-postgres-data:
  mas-postgres-data: