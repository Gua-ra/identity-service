name: CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment for manual deploy"
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/gua-ra/identity-service

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - run: ./gradlew test --no-daemon
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: ref
        run: echo "ref=${IMAGE}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # AUTOMATIC on merge to main; also manually dispatchable (environment=dev) to
  # roll any branch onto dev for QA.
  deploy-dev:
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    runs-on: [self-hosted, dev]
    environment: dev
    steps:
      - name: Roll out ${{ needs.build.outputs.ref }} to dev
        run: |
          IMG="${{ needs.build.outputs.ref }}"
          # k8s pulls the immutable sha-tagged image from GHCR via the ghcr-pull secret
          # (deployment is imagePullPolicy: IfNotPresent + imagePullSecrets) — no docker needed.
          # Use k3s' bundled kubectl as root so PATH + kubeconfig are always correct on the node.
          sudo k3s kubectl -n gua set image deployment/identity-service identity-service="$IMG"
          sudo k3s kubectl -n gua rollout status deployment/identity-service --timeout=180s

  # APPROVAL GATE: fires on every merge to main and on workflow_dispatch with
  # environment=prod. A merge deploys dev automatically (deploy-dev above) and also
  # stages this prod deployment, which pauses until a maintainer approves the
  # `production` GitHub Environment (required reviewer).
  deploy-prod:
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    runs-on: [self-hosted, prod]
    environment: production
    steps:
      - name: Roll out ${{ needs.build.outputs.ref }} to prod
        run: |
          IMG="${{ needs.build.outputs.ref }}"
          sudo k3s kubectl -n gua set image deployment/identity-service identity-service="$IMG"
          sudo k3s kubectl -n gua rollout status deployment/identity-service --timeout=180s
