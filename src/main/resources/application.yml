identity:
  otp:
    code-length: ${IDENTITY_OTP_CODE_LENGTH:6}
    ttl: ${IDENTITY_OTP_TTL:PT5M}
    max-requests-per-phone-per-hour: ${IDENTITY_OTP_MAX_PHONE_PER_HOUR:5}
    max-requests-per-ip-per-hour: ${IDENTITY_OTP_MAX_IP_PER_HOUR:10}
    sms-template: ${IDENTITY_OTP_SMS_TEMPLATE:Your Gua verification code is %s. Never share this code with anyone. Gua will never ask you for it.}
    localized-sms-templates:
      en: ${IDENTITY_OTP_SMS_TEMPLATE_EN:Your Gua verification code is %s. Never share this code with anyone. Gua will never ask you for it.}
      pt-br: ${IDENTITY_OTP_SMS_TEMPLATE_PT_BR:Seu código de verificação Gua é %s. Nunca compartilhe este código com ninguém. A Gua nunca vai pedir esse código.}
  matrix:
    admin-api-base-url: ${IDENTITY_MATRIX_ADMIN_API_BASE_URL}
    client-api-base-url: ${IDENTITY_MATRIX_CLIENT_API_BASE_URL}
    homeserver-domain: ${IDENTITY_MATRIX_HOME_DOMAIN}
    admin-access-token: ${IDENTITY_MATRIX_ADMIN_TOKEN}
    user-localpart-prefix: ${IDENTITY_MATRIX_LOCALPART_PREFIX}
  directory:
    pepper: ${IDENTITY_DIRECTORY_PEPPER}
    # Optional integrity pin for the pepper. A non-reversible fingerprint of the
    # live pepper; when set, the service fails fast on startup if the configured
    # pepper does not match (catches an accidental rotation that would orphan every
    # account). Blank in dev; pin in every long-lived environment. Not a secret.
    pepper-fingerprint: ${IDENTITY_DIRECTORY_PEPPER_FINGERPRINT:}
    max-lookup-batch: ${IDENTITY_DIRECTORY_MAX_LOOKUP_BATCH:1000}
  security:
    pin-reset-cooldown: ${IDENTITY_SECURITY_PIN_RESET_COOLDOWN:PT168H}
    max-pin-attempts: ${IDENTITY_SECURITY_MAX_PIN_ATTEMPTS:5}
    pin-lock-duration: ${IDENTITY_SECURITY_PIN_LOCK_DURATION:PT15M}
    phone-change-cooldown: ${IDENTITY_SECURITY_PHONE_CHANGE_COOLDOWN:PT24H}
    phone-change-challenge-ttl: ${IDENTITY_SECURITY_PHONE_CHANGE_CHALLENGE_TTL:PT10M}
    max-phone-change-otp-attempts: ${IDENTITY_SECURITY_MAX_PHONE_CHANGE_OTP_ATTEMPTS:5}
  rate-limits:
    enabled: ${IDENTITY_RATE_LIMITS_ENABLED:true}
    default-config:
      limit-for-period: ${IDENTITY_RATE_LIMIT_DEFAULT_LIMIT:120}
      refresh-period: ${IDENTITY_RATE_LIMIT_DEFAULT_REFRESH:PT1M}
      timeout-duration: ${IDENTITY_RATE_LIMIT_DEFAULT_TIMEOUT:PT0S}
    endpoints:
      - path: /otp/send
        methods: [POST]
        limit-for-period: ${IDENTITY_RATE_LIMIT_OTP_SEND_LIMIT:5}
        refresh-period: ${IDENTITY_RATE_LIMIT_OTP_SEND_REFRESH:PT1M}
        timeout-duration: ${IDENTITY_RATE_LIMIT_OTP_SEND_TIMEOUT:PT0S}
      - path: /otp/verify
        methods: [POST]
        limit-for-period: ${IDENTITY_RATE_LIMIT_OTP_VERIFY_LIMIT:10}
        refresh-period: ${IDENTITY_RATE_LIMIT_OTP_VERIFY_REFRESH:PT1M}
        timeout-duration: ${IDENTITY_RATE_LIMIT_OTP_VERIFY_TIMEOUT:PT0S}
      - path: /signup/complete
        methods: [POST]
        limit-for-period: ${IDENTITY_RATE_LIMIT_SIGNUP_COMPLETE_LIMIT:10}
        refresh-period: ${IDENTITY_RATE_LIMIT_SIGNUP_COMPLETE_REFRESH:PT1M}
        timeout-duration: ${IDENTITY_RATE_LIMIT_SIGNUP_COMPLETE_TIMEOUT:PT0S}
      - path: /signin/verify-pin
        methods: [POST]
        limit-for-period: ${IDENTITY_RATE_LIMIT_SIGNIN_VERIFY_PIN_LIMIT:10}
        refresh-period: ${IDENTITY_RATE_LIMIT_SIGNIN_VERIFY_PIN_REFRESH:PT1M}
        timeout-duration: ${IDENTITY_RATE_LIMIT_SIGNIN_VERIFY_PIN_TIMEOUT:PT0S}
      - path: /account/phone/change/start
        methods: [POST]
        limit-for-period: ${IDENTITY_RATE_LIMIT_PHONE_CHANGE_START_LIMIT:3}
        refresh-period: ${IDENTITY_RATE_LIMIT_PHONE_CHANGE_START_REFRESH:PT1H}
        timeout-duration: ${IDENTITY_RATE_LIMIT_PHONE_CHANGE_START_TIMEOUT:PT0S}
      - path: /account/phone/change/complete
        methods: [POST]
        limit-for-period: ${IDENTITY_RATE_LIMIT_PHONE_CHANGE_COMPLETE_LIMIT:10}
        refresh-period: ${IDENTITY_RATE_LIMIT_PHONE_CHANGE_COMPLETE_REFRESH:PT1H}
        timeout-duration: ${IDENTITY_RATE_LIMIT_PHONE_CHANGE_COMPLETE_TIMEOUT:PT0S}
      - path: /security/pin
        methods: [POST]
        limit-for-period: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_LIMIT:20}
        refresh-period: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_REFRESH:PT5M}
        timeout-duration: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_TIMEOUT:PT0S}
      - path: /security/pin/reset
        methods: [POST]
        limit-for-period: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_RESET_LIMIT:3}
        refresh-period: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_RESET_REFRESH:PT1H}
        timeout-duration: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_RESET_TIMEOUT:PT0S}
      - path: /security/pin/reset/complete
        methods: [POST]
        limit-for-period: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_RESET_COMPLETE_LIMIT:3}
        refresh-period: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_RESET_COMPLETE_REFRESH:PT1H}
        timeout-duration: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_RESET_COMPLETE_TIMEOUT:PT0S}
      - path: /security/pin/change/start
        methods: [POST]
        limit-for-period: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_CHANGE_START_LIMIT:5}
        refresh-period: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_CHANGE_START_REFRESH:PT1H}
        timeout-duration: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_CHANGE_START_TIMEOUT:PT0S}
      - path: /security/pin/change/complete
        methods: [POST]
        limit-for-period: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_CHANGE_COMPLETE_LIMIT:5}
        refresh-period: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_CHANGE_COMPLETE_REFRESH:PT1H}
        timeout-duration: ${IDENTITY_RATE_LIMIT_SECURITY_PIN_CHANGE_COMPLETE_TIMEOUT:PT0S}
      - path: /directory/lookup
        methods: [POST]
        limit-for-period: ${IDENTITY_RATE_LIMIT_DIRECTORY_LOOKUP_LIMIT:30}
        refresh-period: ${IDENTITY_RATE_LIMIT_DIRECTORY_LOOKUP_REFRESH:PT5M}
        timeout-duration: ${IDENTITY_RATE_LIMIT_DIRECTORY_LOOKUP_TIMEOUT:PT0S}
  sms:
    twilio:
      enabled: ${IDENTITY_SMS_TWILIO_ENABLED:false}
      account-sid: ${IDENTITY_SMS_TWILIO_ACCOUNT_SID:}
      auth-token: ${IDENTITY_SMS_TWILIO_AUTH_TOKEN:}
      from-number: ${IDENTITY_SMS_TWILIO_FROM_NUMBER:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:identity-service;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

oidc:
  issuer: ${IDENTITY_BASE_URL}
  authorization-code-ttl: ${OIDC_AUTHORIZATION_CODE_TTL:PT5M}
  access-token-ttl: ${OIDC_ACCESS_TOKEN_TTL:PT15M}
  id-token-ttl: ${OIDC_ID_TOKEN_TTL:PT15M}
  signing:
    key-id: ${OIDC_JWK_KEY_ID:oidc-signing-key}
    private-key: ${OIDC_RSA_PRIVATE_KEY:}
    public-key: ${OIDC_RSA_PUBLIC_KEY:}
  clients:
    - client-id: ${OIDC_CLIENT_MAS_ID:mas}
      client-secret: ${OIDC_CLIENT_MAS_SECRET:}
      redirect-uris: ${OIDC_CLIENT_MAS_REDIRECTS:http://localhost:8080/upstream/account/callback/oidc,http://localhost:8081/upstream/account/callback/oidc}
      allowed-scopes: openid,profile,phone
      require-pkce: ${OIDC_CLIENT_MAS_REQUIRE_PKCE:false}
    - client-id: ${OIDC_CLIENT_GUA_IOS_ID:gua-ios}
      redirect-uris: ${OIDC_CLIENT_GUA_IOS_REDIRECTS:global.gua:/oidc}
      allowed-scopes: openid,profile,phone
      require-pkce: true

idp:
  login:
    ui-url: ${IDP_LOGIN_UI_URL:/signin}
    session-ttl: ${IDP_LOGIN_SESSION_TTL:PT10M}
    cookie-name: ${IDP_LOGIN_COOKIE_NAME:gua_login}
    cookie-secure: ${IDP_LOGIN_COOKIE_SECURE:true}
    # In-app passkey enrollment handoff (already-signed-in user adds a passkey from settings).
    enroll:
      # OIDC app scheme echoed back only if the ceremony completes; the session is pinned to
      # the authenticated user so this is never reachable as an open login.
      redirect-uri: ${IDP_LOGIN_ENROLL_REDIRECT_URI:global.gua:/oidc}
      token-ttl: ${IDP_LOGIN_ENROLL_TOKEN_TTL:PT2M}
    # Passkey / WebAuthn (browser login + in-app enrollment).
    # PROD MUST set rp-id to the registrable Gua auth domain (gua.global) and origins to the
    # EXACT HTTPS origin serving the sign-in SPA (e.g. https://gua.global). Mismatched values
    # make the browser reject every WebAuthn ceremony — this also fixes onboarding passkeys in prod.
    passkeys:
      enabled: ${IDP_LOGIN_PASSKEYS_ENABLED:true}
      rp-id: ${IDP_LOGIN_PASSKEYS_RP_ID:localhost}
      rp-name: ${IDP_LOGIN_PASSKEYS_RP_NAME:Gua}
      origins: ${IDP_LOGIN_PASSKEYS_ORIGINS:http://localhost:5173,http://localhost:8080}
      challenge-ttl: ${IDP_LOGIN_PASSKEYS_CHALLENGE_TTL:PT5M}
      timeout-millis: ${IDP_LOGIN_PASSKEYS_TIMEOUT_MILLIS:60000}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_EXPOSURE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: identity-service   # so dashboards can filter Gua app metrics by service
  health:
    redis:
      enabled: true
    db:
      enabled: true
